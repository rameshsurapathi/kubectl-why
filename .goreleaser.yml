version: 2

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/rameshsurapathi/kubectl-why/cmd.version={{.Version}}
      - -X github.com/rameshsurapathi/kubectl-why/cmd.commit={{.Commit}}
      - -X github.com/rameshsurapathi/kubectl-why/cmd.date={{.Date}}
    binary: kubectl-why

archives:
  - formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "arm64" }}arm64
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

# Homebrew tap publishing is handled manually.
# See Part 2 in the release guide: create rameshsurapathi/homebrew-tap,
# then add the formula referencing the GitHub release checksums.
